server {
    listen 8000;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Server Side Includes (partials in /includes/)
    ssi on;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

    # Cache static assets (CSS, JS, images, fonts)
    location ~* \.(css|js|svg|png|jpg|jpeg|gif|ico|woff2?)$ {
        expires 7d;
        add_header Cache-Control "public, immutable";
    }

    # HTML pages — no cache (for SEO freshness)
    location ~* \.html$ {
        expires -1;
        add_header Cache-Control "no-store";
    }

    # robots.txt — allow crawlers
    location = /robots.txt {
        expires 1d;
        add_header Cache-Control "public";
    }

    # sitemap.xml — moderate cache
    location = /sitemap.xml {
        expires 1d;
        add_header Cache-Control "public";
        add_header Content-Type "application/xml; charset=utf-8";
    }

    # Clean URLs: /features serves features.html
    location / {
        try_files $uri $uri.html $uri/ =404;
    }

    # Custom 404 page (proper SEO — returns 404 status code)
    error_page 404 /404.html;
    location = /404.html {
        internal;
    }

    # Gzip compression
    gzip on;
    gzip_types text/plain text/css application/javascript application/json application/xml image/svg+xml;
    gzip_min_length 256;
    gzip_vary on;
}
