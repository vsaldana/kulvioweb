name: Deploy

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    concurrency:
      group: deploy-kulvioweb
      cancel-in-progress: false
    steps:
      - name: Trigger deploy webhook
        run: |
          response=$(curl -sf -X POST \
            "${{ secrets.DEPLOY_URL }}/deploy/kulvioweb" \
            -H "Authorization: Bearer ${{ secrets.DEPLOY_TOKEN }}" \
            --max-time 300)
          echo "$response" | python3 -m json.tool
          exit_code=$(echo "$response" | python3 -c "import json,sys; print(json.load(sys.stdin).get('exit_code',1))")
          exit $exit_code
