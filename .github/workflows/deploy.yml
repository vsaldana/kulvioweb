name: Deploy

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: self-hosted
    steps:
      - name: Pull latest code
        run: cd /mnt/c/GIT/kulvioweb && git pull origin main

      - name: Rebuild and restart
        run: |
          cd /home/azureuser/cvs/infra
          docker compose build kulvioweb
          docker compose up -d --wait kulvioweb

      - name: Health check
        run: curl -f http://127.0.0.1:8000/ || exit 1
