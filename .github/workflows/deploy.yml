name: Deploy

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    concurrency:
      group: deploy-kulvioweb
      cancel-in-progress: false
    steps:
      - name: Trigger deploy webhook
        env:
          DEPLOY_URL: ${{ secrets.DEPLOY_URL }}
          DEPLOY_TOKEN: ${{ secrets.DEPLOY_TOKEN }}
        run: |
          HTTP_CODE=$(curl -s -o /tmp/response.txt -w "%{http_code}" -X POST \
            "${DEPLOY_URL}/deploy/kulvioweb" \
            -H "Authorization: Bearer ${DEPLOY_TOKEN}" \
            --max-time 300)
          cat /tmp/response.txt
          echo ""
          echo "HTTP Status: $HTTP_CODE"
          if [ "$HTTP_CODE" != "200" ]; then
            echo "Deploy failed with HTTP $HTTP_CODE"
            exit 1
          fi
          exit_code=$(cat /tmp/response.txt | python3 -c "import json,sys; print(json.load(sys.stdin).get('exit_code',1))")
          exit $exit_code
